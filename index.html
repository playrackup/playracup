<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="apple-touch-icon" sizes="180x180" href="icon-1024.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RACK UP">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#111" />
  <title>RACK UP</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap');
    :root { font-family: -apple-system, system-ui, sans-serif; --score-font: 'Oswald', sans-serif; }
    html { height:100%; background:#0b0b0c; overscroll-behavior:none; }
    body { margin:0; height:calc(var(--vh,1vh)*100); background:#0b0b0c; color:#fff; display:flex; flex-direction:column; overflow:hidden; }
    * { -webkit-user-select:none; user-select:none; box-sizing:border-box; }

    header {
      padding: 8px 16px;
      padding-left: calc(env(safe-area-inset-left) + 20px);
      padding-right: calc(env(safe-area-inset-right) + 20px);
      padding-top: calc(env(safe-area-inset-top) + 8px);
      background: rgba(11,11,12,.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,.06); z-index: 100; flex-shrink: 0;
    }
    .topbar { display:flex; align-items:center; justify-content:space-between; }
    
    /* --- 新しい画像ロゴ用のスタイル --- */
    .logoWrap { display: flex; align-items: center; height: 35px; /* ヘッダーの高さに合わせて調整 */ }
    .real-logo { 
      height: 100%; /* 高さに合わせて拡大縮小 */
      width: auto;
      object-fit: contain;
      /* 解像度を保つための設定 */
      image-rendering: -webkit-optimize-contrast; 
    }
    
    /* シェアモーダル用のロゴ配置 */
    .modalLogoWrap { 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      margin-bottom: 15px; 
    }
    .modal .real-logo { height: 50px; /* モーダル内では少し大きく */ }
    .subLogo { 
      font-size: 11px; 
      font-weight: 700; 
      color: #777; 
      letter-spacing: 0.1em; 
      margin-top: -3px; /* ロゴに近づける */
      font-family: sans-serif;
      text-transform: lowercase;
    }
    /* --- 画像ロゴ用スタイル ここまで --- */
    
    button { background:#1e1e24; color:#fff; border:1px solid #2a2a33; border-radius:12px; padding:10px 14px; font-size:12px; cursor:pointer; font-weight:bold; }
    button.danger { border-color:#4a2a2a; color: #ff6b6b; }

    main { flex:1; display:flex; padding:6px; padding-left: calc(env(safe-area-inset-left) + 6px); padding-right: calc(env(safe-area-inset-right) + 6px); padding-bottom: calc(env(safe-area-inset-bottom) + 6px); overflow: hidden; position: relative; }
    .cards { display:grid; gap:6px; height:100%; width:100%; }

    @media (orientation: portrait) {
      .count2 .score { font-size: 35vh; }
      .count3 .score { font-size: 22vh; }
      .count4 .score { font-size: 18vh; }
      .cards.count4 { grid-template-rows: 1fr 1fr; grid-template-columns: 1fr 1fr; }
    }

    @media (orientation: landscape) {
      .cards.count2, .cards.count3 { grid-template-rows: 1fr; grid-auto-flow: column; }
      .cards.count4 { grid-template-rows: 1fr 1fr; grid-template-columns: 1fr 1fr; }
      .count2 .score { font-size: 60vh; }
      .count3 .score { font-size: 50vh; }
      .count4 .score { font-size: 30vh; }
      .cardHeader { padding: 10px 20px; }
      .playerName { font-size: 28px; }
    }

    .card { position:relative; background:#121216; border:1px solid #2a2a33; border-radius:28px; overflow:hidden; display:flex; flex-direction:column; }
    .cardHeader { display:flex; justify-content:space-between; align-items:flex-start; z-index:2; pointer-events:none; padding: 12px; }
    .playerName { font-weight: 1000; text-shadow: 0 4px 12px rgba(0,0,0,0.9); font-size: 20px;}
    .metaRight { display:flex; flex-direction:column; gap:4px; align-items:flex-end; font-size:11px; font-weight: bold; }
    .winsPill { background:rgba(255,255,255,.08); padding:4px 10px; border-radius:10px; border:1px solid rgba(255,255,255,.1); color: #ccc; text-align: right; line-height:1.2;}
    .totalWinsLabel { background: linear-gradient(to right, #f2994a, #f2c94c); -webkit-background-clip: text; color: transparent; font-weight: 1000; }
    .scoreWrap { position:absolute; inset:0; display:grid; place-items:center; z-index:1; pointer-events:none; }
    .score { font-weight:1000; line-height:0.8; font-family: var(--score-font); text-shadow: 0 0 40px rgba(0,0,0,0.6); }

    .card.reach { border: 3px solid #ff4444; animation: reachPulse 1.5s infinite; }
    @keyframes reachPulse { 0% { box-shadow: inset 0 0 20px #ff0000; } 50% { box-shadow: inset 0 0 50px #ff0000; } 100% { box-shadow: inset 0 0 20px #ff0000; } }

    .winnerOverlay { position:absolute; inset:0; display:none; place-content: center; place-items:center; z-index:10; pointer-events: none; }
    .winnerOverlay::before { content:""; position:absolute; inset:-55%; background:conic-gradient(from 0deg, #ff0078, #ffd200, #00ffaa, #00a0ff, #b400ff, #ff0078); filter:blur(40px); animation: swirl 0.8s linear infinite; opacity:.6; }

    .winnerText {
      position: relative;
      font-weight: 1000;
      font-size: clamp(20px, 8vw, 40px);
      padding: 10px 24px;
      border-radius: 999px;
      border: 4px solid #fff;
      background: rgba(0,0,0,.8);
      text-shadow: 0 0 20px #fff;
      white-space: nowrap; 
    }

    .card.win .winnerOverlay { display:grid; }
    .card.win.shaking .winnerText { animation: winShaking 0.1s infinite, rainbowText 0.5s infinite; }
    @keyframes winShaking { 0% { transform: translate(2px, 2px) rotate(0deg); } 50% { transform: translate(-2px, -2px) rotate(1deg); } 100% { transform: translate(2px, 2px) rotate(0deg); } }
    @keyframes rainbowText { 0% { color: #ff0078; border-color: #ff0078; } 25% { color: #ffd200; border-color: #ffd200; } 50% { color: #00ffaa; border-color: #00ffaa; } 75% { color: #00a0ff; border-color: #00a0ff; } 100% { color: #ff0078; border-color: #ff0078; } }
    @keyframes swirl { to { transform:rotate(360deg); } }

    #hillHillOverlay { position:absolute; inset:0; display:none; z-index:5; pointer-events:none; background:rgba(255,0,0,0.1); animation: flash 0.5s infinite alternate; }
    @keyframes flash { from { background:rgba(255,0,0,0.05); } to { background:rgba(255,0,0,0.2); } }

    .modalBack { position:fixed; inset:0; background:rgba(0,0,0,.94); display:none; align-items:center; justify-content:center; z-index:10000; padding:20px; backdrop-filter: blur(25px); }
    .modal { width:100%; max-width:400px; background:#18181f; border-radius:32px; padding:24px; border:1px solid #333; max-height: 90vh; overflow-y: auto; }
    
    .inputRow { display:flex; gap:10px; margin-bottom:12px; align-items:center; background: #000; padding: 6px 12px; border-radius: 16px; border: 1px solid #222;}
    .inputRow input { background:transparent; border:none; color:#fff; padding:10px; font-size:18px; width:100%; font-weight:bold; outline:none;}
    .btnPrimary { background: #007aff; border: none; padding: 18px; font-weight: 1000; width:100%; border-radius:20px; margin-top:10px; font-size:16px; color:#fff;}
    
    .resetButtonGroup { margin-top:25px; padding-top:20px; border-top: 1px solid #333; display:grid; gap:10px; }
    .btnReset { background: #1a1a1a; border: 1px solid #4a2a2a; color: #ff6b6b; padding: 15px; border-radius: 15px; font-weight: bold; width:100%; cursor:pointer; }
    .btnReset.factory { background: #4a1a1a; border-color: #ff4444; color: #fff; }

    #resetConfirmUI { display: none; text-align: center; }
    .confirmTitle { font-size: 24px; font-weight: 1000; color: #ff4444; margin-bottom: 20px; }
  </style>
</head>
<body>

  <header>
    <div class="topbar">
      <div class="logoWrap">
        <img src="rack_up_logo.png" alt="RACK UP" class="real-logo">
      </div>
      <div style="display:flex; gap:8px;">
        <button onclick="openShare()">SHARE</button>
        <button onclick="openSettings()" class="danger">Settings</button>
      </div>
    </div>
  </header>

  <main>
    <div id="hillHillOverlay"></div>
    <div class="cards" id="cardsContainer"></div>
  </main>

  <div class="modalBack" id="shareModal" onclick="closeAll()">
    <div class="modal" onclick="event.stopPropagation()" style="text-align:center;">
      <div class="modalLogoWrap">
        <img src="rack_up_logo.png" alt="RACK UP" class="real-logo">
        <div class="subLogo">by nabechaya</div>
      </div>
      <img id="qrCodeImg" style="width:200px; height:200px; background:#fff; padding:10px; border-radius:20px; margin-bottom:15px;">
      <div style="font-size:12px; font-weight:bold; margin-bottom:5px;">ADD TO HOME SCREEN TO USE 🎱</div>
      <div style="font-size:10px; color:#aaa; margin-bottom:20px;">共有ボタンからホーム画面に追加して使ってね</div>
      <button class="btnPrimary" onclick="execShare()">COPY URL / SHARE</button>
      <button class="btnPrimary" style="background:#2a2a33;" onclick="closeAll()">CLOSE</button>
    </div>
  </div>

  <div class="modalBack" id="settingsModal" onclick="closeAll()">
    <div class="modal" onclick="event.stopPropagation()">
      <div id="mainSettingsUI">
        <div style="display:flex; gap:6px; margin-bottom:20px;">
          <button id="b2" onclick="changeCount(2)" style="flex:1">2P</button>
          <button id="b3" onclick="changeCount(3)" style="flex:1">3P</button>
          <button id="b4" onclick="changeCount(4)" style="flex:1">4P</button>
        </div>
        <div id="playerInputs"></div>
        <button class="btnPrimary" onclick="applySettings()">SAVE CHANGES</button>
        
        <div class="resetButtonGroup">
          <button class="btnReset" onclick="showResetConfirm('score')">RESET SCORES ONLY</button>
          <button class="btnReset" onclick="showResetConfirm('all')">RESET SCORES & WINS</button>
          <button class="btnReset factory" onclick="showResetConfirm('factory')">FACTORY RESET (ALL RESET)</button>
        </div>
        
        <button class="btnPrimary" style="background:#2a2a33; margin-top:20px;" onclick="closeAll()">CLOSE</button>
      </div>

      <div id="resetConfirmUI">
        <div class="confirmTitle">ARE YOU SURE?</div>
        <p id="resetMsg" style="font-size:14px; color:#ccc; margin-bottom:30px;"></p>
        <div style="display:flex; gap:12px;">
          <button id="confirmYesBtn" style="flex:1; background:#ff4444; color:#fff; border:none; border-radius:15px; padding:20px; font-weight:1000;">YES, RESET</button>
          <button onclick="hideResetConfirm()" style="flex:1; background:#333; border:none; border-radius:15px; color:#fff; padding:20px; font-weight:1000;">CANCEL</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const KEY = "pool_score_v29";
    let state = { playerCount: 2, players: [], winnerId: null };
    const $ = (id) => document.getElementById(id);

    function setVh() { document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`); }
    window.addEventListener('resize', setVh);
    setVh();

    function save() { localStorage.setItem(KEY, JSON.stringify(state)); }
    function load() {
      const data = localStorage.getItem(KEY);
      if(data) state = JSON.parse(data);
      else for(let i=1; i<=4; i++) state.players.push({ id:i, name:`Player ${i}`, score:0, wins:0, race:5 });
      renderAll();
    }

    function renderAll() {
      const container = $("cardsContainer");
      container.innerHTML = "";
      container.className = `cards count${state.playerCount}`;
      
      let reachCount = 0;
      const activePlayers = state.players.slice(0, state.playerCount);
      activePlayers.forEach(p => {
        const card = document.createElement("div");
        const isReach = p.score === p.race - 1 && !state.winnerId;
        if(isReach) reachCount++;
        
        const isWinner = state.winnerId === p.id;
        card.className = "card" + (isWinner ? " win shaking" : "") + (isReach ? " reach" : "");
        
        if(isWinner) {
          setTimeout(() => {
            card.classList.remove('shaking');
          }, 2000);
        }

        const raceTxt = state.playerCount >= 3 ? `RACE<br>TO:${p.race}` : `RACE TO: ${p.race}`;
        const winsTxt = state.playerCount >= 3 ? `WINS:${p.wins}` : `WINS: ${p.wins}`;
        card.innerHTML = `
          <div class="cardHeader">
            <div class="playerName">${p.name}</div>
            <div class="metaRight">
              <span class="winsPill">${raceTxt}</span>
              <span class="totalWinsLabel">${winsTxt}</span>
            </div>
          </div>
          <div class="scoreWrap"><div class="score">${p.score}</div></div>
          <div class="winnerOverlay"><div class="winnerText">WINNER!!!</div></div>
        `;
        attachEvents(card, p.id);
        container.appendChild(card);
      });
      $("hillHillOverlay").style.display = (reachCount === state.playerCount && state.playerCount > 1) ? "block" : "none";
      
      const inputWrap = $("playerInputs");
      inputWrap.innerHTML = "";
      activePlayers.forEach(p => {
        const row = document.createElement("div");
        row.className = "inputRow";
        row.innerHTML = `<input type="text" id="inP${p.id}Name" value="${p.name}"><span style="font-size:10px;color:#555;white-space:nowrap">Race to</span><input type="number" id="inP${p.id}Race" value="${p.race}" style="width:50px">`;
        inputWrap.appendChild(row);
      });
      [2,3,4].forEach(n => $(`b${n}`).style.background = state.playerCount === n ? "#333" : "#1e1e24");
    }

    function handleScore(id, delta) {
      if(state.winnerId) {
        state.players.forEach(p => { if(p.id === state.winnerId) p.wins++; p.score = 0; });
        state.winnerId = null;
      } else {
        const p = state.players.find(x => x.id === id);
        p.score = Math.max(0, p.score + delta);
        if(p.score >= p.race && delta > 0) state.winnerId = id;
      }
      save(); renderAll();
    }

    function openSettings() { hideResetConfirm(); $("settingsModal").style.display = "flex"; }
    function openShare() { 
      $("qrCodeImg").src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(window.location.href)}`;
      $("shareModal").style.display = "flex"; 
    }
    function closeAll() { $("settingsModal").style.display = "none"; $("shareModal").style.display = "none"; }
    
    async function execShare() {
      if (navigator.share) {
        await navigator.share({ text: "Pool Score\n" + window.location.href });
      } else {
        await navigator.clipboard.writeText(window.location.href);
        alert("URLをコピーしました！");
      }
    }

    function applySettings() {
      state.players.slice(0, state.playerCount).forEach(p => {
        p.name = $(`inP${p.id}Name`).value || p.name;
        p.race = parseInt($(`inP${p.id}Race`).value) || p.race;
      });
      save(); renderAll(); closeAll();
    }
    function changeCount(n) { state.playerCount = n; renderAll(); }

    function showResetConfirm(type) {
      $("mainSettingsUI").style.display = "none";
      $("resetConfirmUI").style.display = "block";
      const btn = $("confirmYesBtn");
      if(type === 'score') {
        $("resetMsg").innerHTML = "Reset scores <br>スコアのみリセットします";
        btn.onclick = () => { state.players.forEach(p=>p.score=0); state.winnerId=null; save(); renderAll(); closeAll(); };
      } else if(type === 'all') {
        $("resetMsg").innerHTML = "Reset scores & Wins <br>スコアとWins(累計)の両方をリセットします";
        btn.onclick = () => { state.players.forEach(p=>{p.score=0; p.wins=0;}); state.winnerId=null; save(); renderAll(); closeAll(); };
      } else {
        $("resetMsg").innerHTML = "Factory reset (all reset)<br>全ての名前と履歴が消去されます";
        btn.onclick = () => { localStorage.removeItem(KEY); location.reload(); };
      }
    }
    function hideResetConfirm() { $("mainSettingsUI").style.display = "block"; $("resetConfirmUI").style.display = "none"; }

    function attachEvents(el, id) {
      let sx, sy;
      el.addEventListener('touchstart', e => { sx = e.touches[0].clientX; sy = e.touches[0].clientY; }, {passive:true});
      el.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - sx; const dy = e.changedTouches[0].clientY - sy;
        if(Math.abs(dx) < 15 && Math.abs(dy) < 15) handleScore(id, 1);
        else if (Math.abs(dx) > Math.abs(dy)) handleScore(id, dx > 40 ? 1 : -1);
        else handleScore(id, dy < -40 ? 1 : -1);
      }, {passive:true});
    }
    load();
  </script>
</body>
</html>
